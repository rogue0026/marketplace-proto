syntax = "proto3";

package products;

option go_package = "github.com/rogue0026/marketplace-proto/products";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

message Product {
  uint64 product_id = 1;
  string name = 2;
  uint64 remaining_stock = 3;
  uint64 current_price = 4;
}

message ShowProductsRequest {
  uint64 page_number = 1;
  uint64 items_per_page = 2;
}

message ShowProductsResponse {
  repeated Product products = 1;
}

message AddProductRequest {
  string name = 1;
  uint64 remaining_stock = 2;
  uint64 current_price = 3;
}

message AddProductResponse {
  uint64 product_id = 1;
}

message DeleteProductRequest {
  uint64 product_id = 1;
}

message IncreaseProductRequest {
  uint64 product_id = 1;
  uint64 amount = 2;
}

message DecreaseProductRequest {
  uint64 product_id = 1;
  uint64 amount = 2;
}

message ReserveProductsRequest {
  uint64 product_id = 1;
  uint64 amount = 2;
  uint64 order_id = 3;
  google.protobuf.Timestamp expires_at = 4;
}

message ReserveProductResponse {
  uint64 reservation_id = 1;
}

message CancelReservationRequest {
  uint64 reservation_id = 1;
}

message ConfirmReservationRequest {
  uint64 reservation_id = 1;
}

service ProductService {
  rpc ShowProducts(ShowProductsRequest) returns (ShowProductsResponse) {}
  rpc AddProduct(AddProductRequest) returns (AddProductResponse) {}
  rpc DeleteProduct(DeleteProductRequest) returns (google.protobuf.Empty) {}
  rpc IncreaseProductQuantity(IncreaseProductRequest) returns (google.protobuf.Empty) {}
  rpc DecreaseProductQuantity(DecreaseProductRequest) returns (google.protobuf.Empty) {}

  rpc ReserveProducts(ReserveProductsRequest) returns (ReserveProductResponse) {}
  rpc CancelReservation(CancelReservationRequest) returns (google.protobuf.Empty) {}
  rpc ConfirmReservation(ConfirmReservationRequest) returns (google.protobuf.Empty) {}
}