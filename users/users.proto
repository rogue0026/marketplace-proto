syntax = "proto3";

package users;

option go_package = "github.com/rogue0026/marketplace-proto/users";

import "google/protobuf/empty.proto";

message BasketProduct {
  uint64 id = 1;
  uint64 quantity = 2;
}

message CreateUserRequest {
  string login = 1;
  string password = 2;
}

message CreateUserResponse {
  uint64 user_id = 1;
}

message DeleteUserRequest {
  uint64 user_id = 1;
}

message AddMoneyRequest {
  uint64 user_id = 1;
  uint64 amount = 2;
}

message WriteOffMoneyRequest {
  uint64 user_id = 1;
  uint64 amount = 2;
}

message GetProductsFromBasketRequest {
  uint64 user_id = 1;
}

message GetProductsFromBasketResponse {
  repeated BasketProduct basket_items = 1;
}

message AddProductsToBasketRequest {
  uint64 user_id = 1;
  uint64 product_id = 2;
  uint64 product_quantity = 3;
}

message ClearUserBasketRequest {
  uint64 user_id = 1;
}

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {}
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty) {}

  rpc AddMoney(AddMoneyRequest) returns (google.protobuf.Empty) {}
  rpc WriteOffMoney(WriteOffMoneyRequest) returns (google.protobuf.Empty) {}

  rpc GetProductsFromBasket(GetProductsFromBasketRequest) returns (GetProductsFromBasketResponse) {}
  rpc AddProductToBasket(AddProductsToBasketRequest) returns (google.protobuf.Empty) {}
  rpc ClearUserBasket(ClearUserBasketRequest) returns (google.protobuf.Empty) {}
}
